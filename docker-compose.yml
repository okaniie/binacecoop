services:
  # PHP + Apache Web Server
  web:
    build: .
    container_name: binancecoop_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_SERVER=db
      - DB_USERNAME=binancecoop_user
      - DB_PASSWORD=binancecoop_pass
      - DB_NAME=binancecoop_db
    networks:
      - binancecoop_network
    restart: unless-stopped

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: binancecoop_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: binancecoop_db
      MYSQL_USER: binancecoop_user
      MYSQL_PASSWORD: binancecoop_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./dualedgesql.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - binancecoop_network
    restart: unless-stopped

  # phpMyAdmin for easy DB management
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: binancecoop_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: binancecoop_user
      PMA_PASSWORD: binancecoop_pass
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - binancecoop_network
    restart: unless-stopped

volumes:
  db_data:
    driver: local

networks:
  binancecoop_network:
    driver: bridge
